# Bio-SABR: Biosafety Selective Attention Benchmark for Reasoning
# Configuration for benchmark evaluation

benchmark:
  name: "Bio-SABR"
  version: "1.0.0"
  description: "Biosafety Selective Attention Benchmark for Reasoning -- measuring LLM focus under biosafety/biosecurity information overload"
  track: "Attention"
  competition: "kaggle-measuring-agi"

tasks:
  distractor_robustness:
    items: 50
    conditions: ["clean", "low", "medium", "high"]
    total_evals: 200
    domains: ["pathogen_biology", "biosafety_protocols", "dual_use_research", "biosecurity_policy", "synthetic_biology"]
    items_per_domain: 10
    weight: 0.40  # 40% of composite score

  source_selective:
    items: 50
    sources_per_item: 3
    total_evals: 50
    domains: ["pathogen_biology", "biosafety_protocols", "dual_use_research", "biosecurity_policy", "synthetic_biology"]
    items_per_domain: 10
    weight: 0.30  # 30% of composite score

  attentional_spotlight:
    items: 30
    claims_per_doc: "8-15"
    total_evals: 30
    filter_categories: ["risk_levels", "regulatory_requirements", "dual_use_indicators", "containment_specifications", "temporal_claims", "attribution"]
    items_per_category: 5
    weight: 0.30  # 30% of composite score

scoring:
  answer_matching: "case_insensitive_substring"
  spotlight_matching: "f1_claim_level"
  composite: "weighted_average"
